<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="images/favicon-32x32.png">
    <title>Results summary component</title>
</head>
<body>
    <main class="card">
        <section class="card__result">
            <h1>Your Result</h1>
            <article class="card__circle">
                <p>76</p>
                <span>of 100</span>
            </article>
            <div class="card__text">
                <h2>Great</h2>
                <p>You scored higher that 65% of the people who have taken these tests.</p>
            </div>
        </section>
        <section class="card__summary">
            <h1>Summary</h1>
            <ul>
                <li class="card__reaction">
                    <div class="item-info">
                        <img src="images/icon-reaction.svg" alt="Reaction icon">
                        <p>Reaction</p>
                    </div>
                    <p>80 <span>/ 100</span></p>
                </li>
                <li class="card__memory">
                    <div class="item-info">
                        <img src="images/icon-memory.svg" alt="Memory icon">
                        <p>Memory</p>
                    </div>
                    <p>92 <span>/ 100</span></p>
                </li>
                <li class="card__verbal">
                    <div class="item-info">
                        <img src="images/icon-verbal.svg" alt="Verbal icon">
                        <p>Verbal</p>
                    </div>
                    <p>61 <span>/ 100</span></p>
                </li>
                <li class="card__visual">
                    <div class="item-info">
                        <img src="images/icon-visual.svg" alt="Visual icon">
                        <p>Visual</p>
                    </div>
                    <p>72 <span>/ 100</span></p>
                </li>
            </ul>
            <button class="card__button">Continue</button>
        </section>
    </main>
</body>
</html>
